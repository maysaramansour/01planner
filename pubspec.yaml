name: dabab_planner
description: "Dabab Planner - bilingual local planner"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  table_calendar: ^3.1.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  home_widget: ^0.7.0
  http: ^1.2.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  flutter_markdown: ^0.7.4+1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/InterVariable.ttf
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/CairoVariable.ttf
